name: "Template: Build and Test"

on:
  workflow_call:
    inputs:
      java-version:
        description: "Version de Java a usar"
        type: string
        default: "17"
      working-directory:
        description: "Directorio del proyecto Maven"
        type: string
        default: "."

permissions:
  contents: read

jobs:
  build-test:
    name: "Compilar proyecto y ejecutar pruebas unitarias"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: "Descargando el codigo fuente del repositorio"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Configurando JDK ${{ inputs.java-version }}"
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: ${{ inputs.java-version }}
          distribution: "temurin"
          cache: "maven"

      - name: "Compilando el proyecto con Maven"
        run: mvn -B compile

      - name: "Ejecutando pruebas unitarias"
        run: mvn -B test

      - name: "Publicando resultados de las pruebas como artefacto"
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: ${{ inputs.working-directory }}/target/surefire-reports/
          retention-days: 5
