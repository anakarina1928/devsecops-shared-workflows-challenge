name: "Template: Orchestrator (Pipeline Completo)"

# Este es el UNICO workflow que los repos de microservicios deben llamar.
# Encadena, en orden: preflight -> build-test -> docker-build -> security-scan -> deploy.
#
# El tipo de escaneo de seguridad se decide AQUI, segun el ambiente, para que
# los repos de microservicios no necesiten ninguna logica propia al respecto:
#   dev  -> SAST (CodeQL)
#   qa   -> Container Scan (Trivy)
#   prod -> sin escaneo (se reutiliza la imagen ya validada en dev y qa)
on:
  workflow_call:
    inputs:
      environment:
        description: "Ambiente de destino: dev | qa | prod"
        type: string
        required: true
      namespace:
        description: "Namespace de Kubernetes de destino"
        type: string
        required: true
      registry:
        description: "Hostname del Azure Container Registry"
        type: string
        required: true
      image-name:
        description: "Nombre de la imagen Docker"
        type: string
        required: true
      image-tag:
        description: "Tag de la imagen (normalmente el SHA del commit)"
        type: string
        required: true
      resource-group:
        description: "Resource Group de Azure donde vive el AKS"
        type: string
        required: true
      aks-cluster-name:
        description: "Nombre del cluster AKS"
        type: string
        required: true
      skip-build:
        description: "Si es true, omite build-test/docker-build y solo despliega la imagen indicada (usado para promociones a prod sin reconstruir)"
        type: boolean
        default: false

jobs:
  preflight:
    name: "Preflight - Verificando permisos de Azure/ACR/AKS"
    if: ${{ !inputs.skip-build }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: "Autenticando contra Azure via OIDC"
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Verificando permiso de push sobre el ACR"
        run: az acr login --name $(echo "${{ inputs.registry }}" | cut -d'.' -f1)

      - name: "Verificando permiso de credenciales admin sobre el AKS"
        run: |
          az aks get-credentials \
            --resource-group ${{ inputs.resource-group }} \
            --name ${{ inputs.aks-cluster-name }} \
            --admin \
            --file /tmp/kubeconfig-check

  build-test:
    name: "Etapa 1 - Build y Test"
    if: ${{ !inputs.skip-build }}
    needs: preflight
    uses: ./.github/workflows/template-build-test.yml

  docker-build:
    name: "Etapa 2 - Build y push de imagen Docker"
    if: ${{ !inputs.skip-build }}
    needs: build-test
    uses: ./.github/workflows/template-docker-build.yml
    with:
      registry: ${{ inputs.registry }}
      image-name: ${{ inputs.image-name }}
      image-tag: ${{ inputs.image-tag }}
      environment: ${{ inputs.environment }}
    secrets: inherit

  security-scan:
    name: "Etapa 3 - Escaneo de seguridad (segun ambiente)"
    if: ${{ !inputs.skip-build }}
    needs: docker-build
    uses: ./.github/workflows/template-security-scan.yml
    with:
      scan-type: ${{ inputs.environment == 'dev' && 'sast' || inputs.environment == 'qa' && 'container' || 'none' }}
      image-ref: ${{ needs.docker-build.outputs.full-image-ref }}
      environment: ${{ inputs.environment }}
    secrets: inherit

  deploy:
    name: "Etapa 4 - Despliegue a AKS"
    needs: [security-scan]
    if: always() && (inputs.skip-build || needs.security-scan.result == 'success')
    uses: ./.github/workflows/template-deploy-aks.yml
    with:
      environment: ${{ inputs.environment }}
      namespace: ${{ inputs.namespace }}
      image-ref: ${{ inputs.registry }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
      resource-group: ${{ inputs.resource-group }}
      aks-cluster-name: ${{ inputs.aks-cluster-name }}
    secrets: inherit
