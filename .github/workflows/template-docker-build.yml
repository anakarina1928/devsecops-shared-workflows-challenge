name: "Template: Docker Build and Push to ACR"

on:
  workflow_call:
    inputs:
      registry:
        description: "Hostname del Azure Container Registry (ej. miacr.azurecr.io)"
        type: string
        required: true
      image-name:
        description: "Nombre de la imagen (sin registry ni tag)"
        type: string
        required: true
      image-tag:
        description: "Tag de la imagen (ej. sha del commit)"
        type: string
        required: true
      dockerfile-path:
        description: "Ruta al Dockerfile"
        type: string
        default: "."
      environment:
        description: "Ambiente de GitHub (dev, qa, prod) usado para resolver la Federated Credential de OIDC"
        type: string
        required: true
    outputs:
      full-image-ref:
        description: "Referencia completa de la imagen publicada"
        value: ${{ jobs.build-push.outputs.image-ref }}

permissions:
  contents: read
  id-token: write

jobs:
  build-push:
    name: "Construir y publicar imagen Docker en ACR"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image-ref: ${{ steps.set-output.outputs.image-ref }}
    steps:
      - name: "Descargando el codigo fuente del repositorio"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Autenticando contra Azure via OIDC (sin secretos estaticos)"
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Iniciando sesion en Azure Container Registry"
        run: az acr login --name $(echo "${{ inputs.registry }}" | cut -d'.' -f1)

      - name: "Configurando Docker Buildx"
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: "Construyendo y publicando la imagen Docker"
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ inputs.registry }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Registrando la referencia final de la imagen"
        id: set-output
        run: echo "image-ref=${{ inputs.registry }}/${{ inputs.image-name }}:${{ inputs.image-tag }}" >> "$GITHUB_OUTPUT"
