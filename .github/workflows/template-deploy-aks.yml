name: "Template: Deploy to AKS"

on:
  workflow_call:
    inputs:
      environment:
        description: "Ambiente de destino (dev, qa, prod)"
        type: string
        required: true
      namespace:
        description: "Namespace de Kubernetes"
        type: string
        required: true
      image-ref:
        description: "Referencia completa de la imagen a desplegar"
        type: string
        required: true
      resource-group:
        description: "Resource Group de Azure donde vive el AKS"
        type: string
        required: true
      aks-cluster-name:
        description: "Nombre del cluster AKS"
        type: string
        required: true
      helm-chart-path:
        description: "Ruta al Helm chart"
        type: string
        default: "helm/microservicio"
      helm-release-name:
        description: "Nombre del release de Helm"
        type: string
        default: "microservicio"
      keyvault-name:
        description: "Nombre del Azure Key Vault donde vive el secreto de demostracion"
        type: string
        default: "kv-devsecops-challenge"
      keyvault-secret-name:
        description: "Nombre del secreto dentro del Key Vault"
        type: string
        default: "greeting-secret"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: "Desplegando microservicio en AKS (namespace: ${{ inputs.namespace }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: "Descargando el codigo fuente (incluye el Helm chart)"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Autenticando contra Azure via OIDC"
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Obteniendo el secreto de demostracion desde Azure Key Vault"
        id: get-secret
        uses: anakarina1928/devsecops-shared-workflows-challenge/actions/keyvault-secret-fetch@main
        with:
          keyvault-name: ${{ inputs.keyvault-name }}
          secret-name: ${{ inputs.keyvault-secret-name }}

      - name: "Configurando el contexto del cluster AKS"
        uses: azure/aks-set-context@c7eb093e5a5d47caa333f64974d5fd1cd4bf069d # v4.0.3
        with:
          resource-group: ${{ inputs.resource-group }}
          cluster-name: ${{ inputs.aks-cluster-name }}
          admin: 'true'

      - name: "Instalando Helm"
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: "Creando el namespace si no existe (${{ inputs.namespace }})"
        run: kubectl create namespace ${{ inputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -

      - name: "Desplegando con Helm (helm upgrade --install)"
        env:
          SECRET_VALUE: ${{ steps.get-secret.outputs.secret-value }}
        run: |
          echo "Desplegando imagen: ${{ inputs.image-ref }}"
          echo "Ambiente: ${{ inputs.environment }} | Namespace: ${{ inputs.namespace }}"
          helm upgrade --install ${{ inputs.helm-release-name }} ${{ inputs.helm-chart-path }} \
            --namespace ${{ inputs.namespace }} \
            --set image.repository=$(echo "${{ inputs.image-ref }}" | cut -d':' -f1) \
            --set image.tag=$(echo "${{ inputs.image-ref }}" | cut -d':' -f2) \
            --set environment=${{ inputs.environment }} \
            --set-string secretValue="$SECRET_VALUE" \
            --wait --timeout 5m

      - name: "Verificando que el rollout se complete correctamente"
        run: kubectl rollout status deployment/${{ inputs.helm-release-name }} -n ${{ inputs.namespace }} --timeout=120s
